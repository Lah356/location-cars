<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>

  <!-- Google Font Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #111, #333);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }

    .login-box {
      background: white;
      padding: 40px;
      width: 350px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 25px;
      color: #111;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: right;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #ff8800;
      outline: none;
      box-shadow: 0 0 5px rgba(255,136,0,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ff8800;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e67600;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>🔐 تسجيل الدخول</h2>

    <div class="input-group">
      <input type="email" id="email" placeholder="البريد الإلكتروني">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="كلمة المرور">
    </div>

    <button onclick="login()">دخول</button>

    <div class="footer">
      Premium Car Rental System
    </div>
  </div>

  <script>
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === "admin@agency.com" && password === "123456") {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "dashboard.html";
      } else {
        alert("بيانات غير صحيحة ❌");
      }
    }
  </script>

</body>
</html>
