<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة صاحب الوكالة - استمارة الحجز</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #f4f6fb;
      margin:0;
      padding:0;
    }
    header {
      background:black;
      color:white;
      padding:20px;
      text-align:center;
      font-size:22px;
    }
    .container {
      max-width:800px;
      margin:40px auto;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }
    h2,h3 {
      text-align:center;
      color:#ff8800;
    }
    label {
      display:block;
      margin:15px 0 5px;
      font-weight:bold;
    }
    input, select {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #ccc;
      font-size:16px;
      outline:none;
    }
    input:focus, select:focus {
      border-color:#ff8800;
    }
    .btn {
      margin-top:25px;
      padding:15px;
      width:100%;
      border:none;
      border-radius:40px;
      font-size:18px;
      font-weight:bold;
      background:linear-gradient(to right, #ffb400, #ff8800);
      color:white;
      cursor:pointer;
    }
    .btn:hover {
      background:black;
    }
  </style>
</head>

<body>
<header>📝 لوحة صاحب الوكالة - استمارة الحجز</header>

<div class="container">

  <h2>استمارة معلومات الحجز</h2>

  <!-- معلومات العميل -->
  <h3>👤 معلومات الزبون</h3>
  <label>الاسم الشخصي</label>
  <input type="text" id="firstName" placeholder="مثال: الحسن">

  <label>الاسم العائلي</label>
  <input type="text" id="lastName" placeholder="مثال: العلوي">

  <label>رقم البطاقة الوطنية</label>
  <input type="text" id="idCard" placeholder="مثال: AB123456">

  <label>تاريخ الازدياد</label>
  <input type="date" id="birthDate">

  <!-- معلومات السيارة -->
  <h3>🚗 معلومات السيارة</h3>
  <label>اسم السيارة</label>
  <input type="text" id="carName" placeholder="مثال: Dacia Logan">

  <label>رقم السيارة</label>
  <input type="text" id="carNumber" placeholder="مثال: 12345">

  <label>عدد المقاعد</label>
  <input type="number" id="seats" placeholder="مثال: 5">

  <label>نوع الوقود</label>
  <select id="fuelSelect">
    <option value="ديزل">Diesel</option>
    <option value="بنزين">Essence</option>
  </select>

  <label>نوع المحرك</label>
  <input type="text" id="gear" placeholder="مثال: أوتوماتيك">

  <label>عدد الخيول</label>
  <input type="number" id="horsePower" placeholder="مثال: 100">

  <!-- التواريخ -->
  <label>تاريخ البداية</label>
  <input type="date" id="startDate">

  <label>تاريخ النهاية</label>
  <input type="date" id="endDate">

  <button class="btn" onclick="generatePDF()">📄 تحميل الاستمارة PDF</button>
</div>

<!-- مكتبة jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
async function generatePDF() {

  const inputs = document.querySelectorAll("input, select");
  for (let input of inputs) {
    if (input.value.trim() === "") {
      alert("⚠️ المرجو ملء جميع الحقول قبل تحميل PDF");
      return;
    }
  }

  const contractNumber = "INT-" + Date.now();
  const today = new Date().toLocaleDateString("ar-MA");

  const diffDays = Math.ceil(
    (new Date(startDate.value) - new Date(endDate.value)) / 
    (1000*60*60*24)
  ) * -1 + 1;

  const pricePerDay = 200;
  const totalPrice = diffDays * pricePerDay;

  const contractDiv = document.createElement("div");
  contractDiv.style.fontFamily = "Cairo";
  contractDiv.style.direction = "rtl";
  contractDiv.style.background = "white";
  contractDiv.style.width = "800px";
  contractDiv.style.padding = "50px";
  contractDiv.style.position = "relative";

  contractDiv.innerHTML = `

    <!-- Watermark -->
    <div style="
      position:absolute;
      top:40%;
      left:20%;
      font-size:80px;
      color:rgba(0,0,0,0.05);
      transform:rotate(-30deg);
      pointer-events:none;">
      RENTAL
    </div>

    <!-- Header -->
    <div style="border-bottom:4px solid #111;padding-bottom:20px;margin-bottom:30px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <h2 style="margin:0;">PREMIUM CAR RENTAL</h2>
          <div style="font-size:13px;color:#555;">
            Téléphone: 06XXXXXXXX<br>
            Email: contact@agency.com
          </div>
        </div>
        <div style="font-size:14px;text-align:left;">
          <strong>Contract ID:</strong> ${contractNumber}<br>
          <strong>Date:</strong> ${today}
        </div>
      </div>
    </div>

    <!-- Client -->
    <h3 style="border-left:5px solid #111;padding-left:10px;">CLIENT INFORMATION</h3>
    <table style="width:100%;border-collapse:collapse;margin:20px 0;">
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Full Name</td>
        <td style="padding:10px;border:1px solid #ddd;">
          ${firstName.value} ${lastName.value}
        </td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">ID Number</td>
        <td style="padding:10px;border:1px solid #ddd;">${idCard.value}</td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Birth Date</td>
        <td style="padding:10px;border:1px solid #ddd;">${birthDate.value}</td>
      </tr>
    </table>

    <!-- Vehicle -->
    <h3 style="border-left:5px solid #111;padding-left:10px;">VEHICLE DETAILS</h3>
    <table style="width:100%;border-collapse:collapse;margin:20px 0;">
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Vehicle</td>
        <td style="padding:10px;border:1px solid #ddd;">${carName.value}</td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Plate Number</td>
        <td style="padding:10px;border:1px solid #ddd;">${carNumber.value}</td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Fuel</td>
        <td style="padding:10px;border:1px solid #ddd;">${fuelSelect.value}</td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">Transmission</td>
        <td style="padding:10px;border:1px solid #ddd;">${gear.value}</td>
      </tr>
    </table>

    <!-- Rental Period -->
    <h3 style="border-left:5px solid #111;padding-left:10px;">RENTAL PERIOD</h3>
    <table style="width:100%;border-collapse:collapse;margin:20px 0;">
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">From</td>
        <td style="padding:10px;border:1px solid #ddd;">${startDate.value}</td>
      </tr>
      <tr>
        <td style="padding:10px;border:1px solid #ddd;">To</td>
        <td style="padding:10px;border:1px solid #ddd;">${endDate.value}</td>
      </tr>
      <tr style="background:#f2f2f2;font-weight:bold;">
        <td style="padding:10px;border:1px solid #ddd;">Total Price</td>
        <td style="padding:10px;border:1px solid #ddd;">
          ${totalPrice} MAD
        </td>
      </tr>
    </table>

    <!-- Signatures -->
    <div style="margin-top:60px;display:flex;justify-content:space-between;">
      <div>
        Client Signature<br><br>
        ______________________
      </div>
      <div>
        Company Stamp & Signature<br><br>
        ______________________
      </div>
    </div>

    <!-- Footer -->
    <div style="margin-top:70px;font-size:11px;color:#666;text-align:center;">
      This contract is legally binding under Moroccan law.
    </div>
  `;

  document.body.appendChild(contractDiv);

  const canvas = await html2canvas(contractDiv);
  const imgData = canvas.toDataURL("image/png");

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("p", "mm", "a4");

  const imgWidth = 190;
  const imgHeight = canvas.height * imgWidth / canvas.width;

  doc.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
  // حفظ العقد في LocalStorage
let contracts = JSON.parse(localStorage.getItem("contracts")) || [];

contracts.push({
  contractId: contractNumber,
  client: firstName.value + " " + lastName.value,
  car: carName.value,
  total: totalPrice,
  date: today
});

localStorage.setItem("contracts", JSON.stringify(contracts));
  doc.save(`Premium_Contract_${contractNumber}.pdf`);

  document.body.removeChild(contractDiv);
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
