<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
  <style>
    body {
      font-family: Cairo;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      direction: rtl;
    }

    .header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      font-size: 18px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .new {
      background: #ff8800;
      color: white;
    }

    .logout {
      background: crimson;
      color: white;
    }
  </style>
</head>
<body>

  <div class="header">
    لوحة تحكم وكالة كراء السيارات 🚗
  </div>

  <div class="container">

    <div class="cards">
      <div class="card">
        📄 عدد العقود<br>
        <span id="totalContracts">0</span>
      </div>

      <div class="card">
        💰 مجموع الأرباح<br>
        <span id="totalRevenue">0 MAD</span>
      </div>
    </div>

    <button class="new" onclick="window.location.href='admin.html'">
      إنشاء عقد جديد
    </button>

    <button class="logout" onclick="logout()">
      تسجيل الخروج
    </button>

  </div>

  <script>
    if (localStorage.getItem("loggedIn") !== "true") {
      window.location.href = "login.html";
    }

    let contracts = JSON.parse(localStorage.getItem("contracts")) || [];

    document.getElementById("totalContracts").innerText = contracts.length;

    let totalRevenue = contracts.reduce((sum, c) => sum + c.total, 0);
    document.getElementById("totalRevenue").innerText = totalRevenue + " MAD";

    function logout() {
      localStorage.removeItem("loggedIn");
      window.location.href = "login.html";
    }
  </script>

<script>

  const translations = {
  ar: {
    dashboard: "لوحة تحكم وكالة كراء السيارات 🚗",
    contracts: "عدد العقود",
    revenue: "مجموع الأرباح",
    newContract: "إنشاء عقد جديد",
    logout: "تسجيل الخروج"
  },
  fr: {
    dashboard: "Tableau de bord - Location de voitures 🚗",
    contracts: "Nombre de contrats",
    revenue: "Revenu total",
    newContract: "Nouveau contrat",
    logout: "Se déconnecter"
  }
};
</script>

</body>
</html>
